<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./output.css">
  <title>Frontend Mentor | Intro component with sign up form</title>
</head>

<body class="bg-[url('./images/bg-intro-desktop.png')] bg-cover bg-center bg-[#FF7979]">

  <div class="flex  min-h-screen items-center justify-center gap-10 px-10">
    <div class="text-white w-64 flex-1">
      <h1 class="text-3xl font-bold font-['Poppins']">Learn to code by watching others</h1>

      <p>See how experienced developers solve problems in real-time. Watching scripted tutorials is great,
        but understanding how developers think is invaluable.</p>
    </div>

    <div class="flex-1">

      <div class="bg-purple-700 w-full rounded-lg mb-5 h-16 flex items-center justify-center text-center">
        <p class="text-white">Try it free 7 days then $20/mo. thereafter</p>
      </div>
      <form class="bg-white rounded-lg p-8 space-y-4">

        <input type="text" placeholder="First Name" class="w-full border border-gray-300 p-3 rounded-md">

        <input type="text" placeholder="Last Name" class="w-full border border-gray-300 p-3 rounded-md">

        <input type="email" placeholder="Email Address" class="w-full border border-gray-300 p-3 rounded-md">

        <input type="password" placeholder="Password" class="w-full border border-gray-300 p-3 rounded-md">

        <button class="bg-[#38CC8B] w-full rounded-md h-12 text-white shadow-lg">CLAIM YOUR FREE TRIAL</button>
        <p>By clicking the button, you are agreeing to our <span class="text-red-600">Terms and Services</span></p>
      </form>

    </div>
  </div>

</body>

</html>
