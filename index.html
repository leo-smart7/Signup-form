<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./output.css">
  <title>Frontend Mentor | Intro component with sign up form</title>
</head>

<body class="bg-[url('./images/bg-intro-desktop.png')] bg-cover bg-center bg-[#FF7979]">

  <div class="flex  min-h-screen items-center justify-center gap-10 px-10 mr-15 ml-30">
    <div class="text-white w-64 flex-1">
      <h1 class="text-5xl font-bold font-['Poppins'] mb-8">Learn to code by watching others</h1>

      <p class="text-lg">See how experienced developers solve problems in real-time. Watching scripted tutorials is
        great, but understanding how developers think is invaluable.</p>
    </div>

    <div class="w-full max-w-[540px]">

      <div
        class="bg-purple-700 w-full rounded-lg mb-5 h-16 flex items-center justify-center text-center shadow-[0_8px_0_rgba(0,0,0,0.25)]">
        <p class="text-white"><span class="font-bold">Try it free 7 days </span>then $20/mo. thereafter</p>
      </div>

      <form class="bg-white rounded-lg p-8 space-y-6 shadow-[0_8px_0_rgba(0,0,0,0.25)]">

        <input type="text" placeholder="First Name"
          class="input-field w-full border border-gray-300 p-3 rounded-md focus:outline-none focus:border-[#5E54A4] caret-[#5E54A4]">

        <input type="text" placeholder="Last Name"
          class="input-field w-full border border-gray-300 p-3 rounded-md focus:outline-none focus:border-[#5E54A4] caret-[#5E54A4]">

        <input type="email" placeholder="Email Address"
          class="input-field w-full border border-gray-300 p-3 rounded-md focus:outline-none focus:border-[#5E54A4] caret-[#5E54A4]">

        <input type="password" placeholder="Password"
          class="input-field w-full border border-gray-300 p-3 rounded-md focus:outline-none focus:border-[#5E54A4] caret-[#5E54A4]">

        <button
          class="bg-[#38CC8B] w-full rounded-md h-12 text-white font-bold shadow-[0_6px_0_rgba(47,182,124,0.9)]">CLAIM
          YOUR FREE TRIAL</button>

        <p class="text-gray-400 text-xs text-center">By clicking the button, you are agreeing to our <span
            class="text-[#FF7979] font-bold">Terms and
            Services</span></p>
      </form>

    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
